name: Release Web to npm

on:
  push:
    tags:
      - 'web-v*'

permissions:
  contents: read

jobs:
  release:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify version matches tag
        working-directory: packages/web-cli
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#web-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build monorepo (core → ui → web)
        run: pnpm build:web

      - name: Build web-cli distribution
        run: pnpm --filter pmeow-web run build

      - name: Smoke test — install from tarball
        run: |
          cd packages/web-cli
          TARBALL=$(npm pack)
          mkdir /tmp/smoke-test && cd /tmp/smoke-test
          npm init -y
          npm install "$GITHUB_WORKSPACE/packages/web-cli/$TARBALL"
          npx pmeow-web --help

      - name: Smoke test — minimal startup
        run: |
          cd /tmp/smoke-test
          MONITOR_DB_PATH=/tmp/smoke-test/test.db timeout 5 npx pmeow-web --port 17299 || EXIT_CODE=$?
          # Server starts and listens, timeout exits with 124
          if [ "${EXIT_CODE:-0}" -eq 124 ]; then
            echo "Server started successfully (killed by timeout)"
          else
            echo "::error::Server failed to start (exit code: ${EXIT_CODE:-0})"
            exit 1
          fi

      - name: Publish to npm
        working-directory: packages/web-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
