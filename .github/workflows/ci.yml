name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    name: Node.js checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm build:core

      - name: Typecheck core
        run: pnpm typecheck:core

      - name: Test core
        run: pnpm test:core

      - name: Build UI
        run: pnpm build:ui

      - name: Build web
        run: pnpm build:web

      - name: Typecheck web
        run: pnpm typecheck:web

      - name: Test web
        run: pnpm test:web

  python:
    name: Python Agent checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - name: Install agent
        working-directory: agent
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: agent
        run: pytest -v
