services:
  pmeow-web:
    build: .
    container_name: pmeow-web
    restart: unless-stopped
    ports:
      - "17200:17200"
    volumes:
      - ./docker-data:/data
    environment:
      HOST: 0.0.0.0
      PORT: 17200
      MONITOR_DB_PATH: /data/monitor.db
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
